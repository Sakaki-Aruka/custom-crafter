name: Publish docs

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create deploy directories
        run: |
          mkdir -p deploy/kdoc
          mkdir -p deploy/javadoc
          mkdir -p deploy/document

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate KDoc
        run: mvn -pl api resources:resources dokka:dokka -Ddokka.outputDir=$(pwd)/deploy/kdoc -ntp

      - name: Generate Javadoc
        run: mvn -pl api dokka:javadoc -Ddokka.outputDir=$(pwd)/deploy/javadoc -ntp

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/document/package-lock.json

      - name: Install document dependencies
        working-directory: api/document
        run: npm ci

      - name: Build Starlight document
        working-directory: api/document
        run: npm run build
        env:
          DEPLOY_SITE: https://sakaki-aruka.github.io/custom-crafter/document
          DEPLOY_BASE: /custom-crafter/document

      - name: Assemble deploy directory
        run: cp -r api/document/dist/. deploy/document/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
name: Publish docs

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate KDoc
        run: mvn -pl api resources:resources dokka:dokka

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/document/package-lock.json

      - name: Install document dependencies
        working-directory: api/document
        run: npm ci

      - name: Build Starlight document
        working-directory: api/document
        run: npm run build
        env:
          DEPLOY_SITE: https://sakaki-aruka.github.io
          DEPLOY_BASE: /custom-crafter/document

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/kdoc
          mkdir -p deploy/document
          cp -r api/docs/. deploy/kdoc/
          cp -r api/document/dist/. deploy/document/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
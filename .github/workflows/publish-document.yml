name: Publish Starlight document

on:
  push:
    branches:
      - "master"
  workflow_dispatch:


jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api/document

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/document/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DEPLOY_SITE: https://sakaki-aruka.github.io
          DEPLOY_BASE: /custom-crafter/document

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./api/document/dist
          destination_dir: document
          keep_files: true